name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Bash version under test
        run: |
          export PATH="/bin:/usr/bin:/usr/sbin:/sbin:$PATH"
          /bin/bash --version

      - name: Syntax check wrapper
        run: |
          export PATH="/bin:/usr/bin:/usr/sbin:/sbin:$PATH"
          /bin/bash -n sss-ssh-keygen.sh

      - name: Run shell test harness
        run: |
          export PATH="/bin:/usr/bin:/usr/sbin:/sbin:$PATH"
          TEST_BASH=/bin/bash /bin/bash tests/run.sh
