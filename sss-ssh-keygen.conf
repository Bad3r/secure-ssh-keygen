# Assignment-only defaults read by ./sss-ssh-keygen.sh
#
# Use KEY=VALUE lines only. The wrapper parses this file instead of sourcing it,
# so shell syntax and commands are rejected.

# Profiles:
#   ed25519 | software
#   fido-ecdsa | hardware
#   fido-ed25519
#   rsa3072 | compat
#   rsa4096
#   fips
SSH_KEYGEN_PROFILE=ed25519

# bcrypt_pbkdf rounds for passphrase-protected private keys.
# OpenSSH defaults to 16. This template uses 100 as a safer user-key baseline.
SSH_KEYGEN_KDF_ROUNDS=100

# Keep the private-key encryption cipher explicit.
SSH_KEYGEN_CIPHER=aes256-ctr

# Used by configurable RSA profiles such as fips. The fixed rsa3072 and
# rsa4096 profiles override this value.
SSH_KEYGEN_RSA_BITS=3072

# Leave empty to use the wrapper's generated comment:
# user@host - YYYY-MM-DD
# Use SSH_KEYGEN_COMMENT_USER, SSH_KEYGEN_COMMENT_HOST, and
# SSH_KEYGEN_COMMENT_EMAIL to refine the generated value.
SSH_KEYGEN_COMMENT=

# Leave empty to use the wrapper's profile-specific output path.
# Set SSH_KEYGEN_USE_XDG_OUTPUT=1 to switch the default directory to XDG.
SSH_KEYGEN_OUTPUT=

# 0 prompts for a passphrase. 1 passes -N "" for passphrase-less keys.
SSH_KEYGEN_EMPTY_PASSPHRASE=0

# Set to 1 to add -q.
SSH_KEYGEN_QUIET=0

# Set to 1 to print the command without running ssh-keygen.
SSH_KEYGEN_DRY_RUN=0

# Set to 1 to place default outputs under XDG_CONFIG_HOME/ssh or
# $HOME/.config/ssh when XDG_CONFIG_HOME is unset.
SSH_KEYGEN_USE_XDG_OUTPUT=0

# Optional comment fields used by the generated default comment.
SSH_KEYGEN_COMMENT_USER=
SSH_KEYGEN_COMMENT_HOST=
SSH_KEYGEN_COMMENT_EMAIL=

# FIDO options.
# The hardware alias defaults to ed25519-sk. Use ecdsa-sk for older YubiKeys
# or other authenticators that do not support ed25519-sk.
SSH_KEYGEN_FIDO_ALGORITHM=ed25519-sk
SSH_KEYGEN_FIDO_VERIFY_REQUIRED=1
SSH_KEYGEN_FIDO_RESIDENT=0
SSH_KEYGEN_FIDO_APPLICATION="ssh:"
